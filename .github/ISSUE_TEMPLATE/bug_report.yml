name: Bug Report
description: Report a bug or unexpected behavior in Muxit
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the sections below so we can reproduce and fix the issue quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of what the bug is.
      placeholder: When I run ..., Muxit fails to ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps someone else can follow to reproduce the problem.
      placeholder: |
        1. Install Muxit via ...
        2. Connect device ...
        3. Run script ...
        4. Observe error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include full error messages, stack traces, and logs.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Muxit version
      description: Output of `muxit --version`, release tag, or commit SHA.
      placeholder: v0.1.0 / commit abc1234
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: Windows 11 23H2 / macOS 14.4 / Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: hardware
    attributes:
      label: Hardware involved
      description: Instruments, robots, sensors, or cameras in use (model, firmware, interface).
      placeholder: |
        - Keysight DMM 34461A (USB/VISA)
        - Arduino Uno on COM4
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, config files, related issues, or anything else that might help.
    validations:
      required: false
